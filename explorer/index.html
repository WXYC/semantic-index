<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WXYC Semantic Graph Explorer</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; background: #0a0a0a; color: #e0e0e0; overflow: hidden; }

  #controls {
    position: fixed; top: 0; left: 0; right: 380px; z-index: 10;
    padding: 12px 16px; background: rgba(10,10,10,0.95); border-bottom: 1px solid #333;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  #controls input[type="text"] {
    background: #1a1a1a; border: 1px solid #444; color: #e0e0e0; padding: 6px 10px;
    border-radius: 4px; font-family: inherit; font-size: 13px; width: 260px;
  }
  #controls input:focus { outline: none; border-color: #6a9fb5; }
  #controls select {
    background: #1a1a1a; border: 1px solid #444; color: #e0e0e0; padding: 6px 8px;
    border-radius: 4px; font-family: inherit; font-size: 12px;
  }
  #controls select:disabled { opacity: 0.4; cursor: not-allowed; }
  #controls label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  #random {
    background: none; border: 1px solid #444; color: #888; padding: 5px 8px;
    border-radius: 4px; font-size: 15px; cursor: pointer; line-height: 1;
  }
  #random:hover { color: #e0e0e0; border-color: #6a9fb5; }
  #status { font-size: 11px; color: #666; margin-left: auto; }
  .title { font-size: 14px; font-weight: 600; color: #6a9fb5; letter-spacing: 1px; }

  #tooltip {
    position: fixed; background: rgba(20,20,20,0.95); border: 1px solid #444;
    padding: 8px 12px; border-radius: 4px; font-size: 11px; pointer-events: none;
    display: none; z-index: 20; max-width: 300px;
  }
  #tooltip .name { font-size: 13px; font-weight: 600; color: #e0e0e0; }
  #tooltip .meta { color: #888; margin-top: 2px; }

  svg { cursor: grab; }
  svg:active { cursor: grabbing; }

  /* Sidebar */
  #sidebar {
    position: fixed; top: 0; right: 0; width: 380px; height: 100vh;
    background: rgba(15,15,15,0.97); border-left: 1px solid #333;
    display: flex; flex-direction: column; z-index: 15;
  }
  .sidebar-header {
    padding: 16px 20px; border-bottom: 1px solid #333; flex-shrink: 0;
  }
  .sidebar-header .artist-name {
    font-size: 16px; font-weight: 600; color: #6a9fb5; display: block;
  }
  .sidebar-header .artist-meta {
    font-size: 11px; color: #888; margin-top: 4px; display: block;
  }
  .sidebar-list {
    flex: 1; overflow-y: auto; padding: 0;
  }
  .sidebar-card {
    padding: 14px 20px; border-bottom: 1px solid #222; cursor: pointer;
    transition: background 0.15s;
  }
  .sidebar-card:hover { background: rgba(106,159,181,0.08); }
  .sidebar-card.active { background: rgba(106,159,181,0.15); }
  .sidebar-card .card-header {
    display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px;
  }
  .sidebar-card .neighbor-name {
    font-size: 13px; font-weight: 600; color: #e0e0e0;
  }
  .sidebar-card .weight-badge {
    font-size: 10px; color: #6a9fb5; background: rgba(106,159,181,0.15);
    padding: 1px 6px; border-radius: 3px; white-space: nowrap;
  }
  .sidebar-card .neighbor-meta {
    font-size: 11px; color: #666; margin-bottom: 6px;
  }
  .sidebar-card .narrative {
    font-size: 12px; line-height: 1.5; color: #aaa;
  }
  .sidebar-card .narrative.loading {
    color: #555; font-style: italic;
  }
  .sidebar-empty {
    padding: 20px; color: #555; font-size: 12px; text-align: center;
  }

  .streaming-embeds { margin-top: 12px; }
  .streaming-embeds iframe {
    width: 100%; border: none; border-radius: 8px; margin-bottom: 8px;
  }
  .external-links {
    margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap;
  }
  .external-links a {
    font-size: 11px; color: #6a9fb5; text-decoration: none;
    padding: 3px 8px; border: 1px solid #333; border-radius: 3px;
    transition: border-color 0.15s;
  }
  .external-links a:hover { border-color: #6a9fb5; }
</style>
</head>
<body>

<div id="controls">
  <span class="title">WXYC</span>
  <input type="text" id="search" placeholder="Search artist..." autocomplete="off">
  <button id="random" title="Random artist">&#x1F3B2;</button>
  <div>
    <label>Edge type</label>
    <select id="edgeType">
      <option value="djTransition">DJ Transitions</option>
      <option value="sharedPersonnel">Shared Personnel</option>
      <option value="sharedStyle">Shared Style</option>
      <option value="labelFamily">Label Family</option>
      <option value="compilation">Compilation</option>
      <option value="crossReference">Cross-Reference</option>
    </select>
  </div>
  <div>
    <label>Depth</label>
    <select id="depth">
      <option value="1">1 hop</option>
      <option value="2" selected>2 hops</option>
    </select>
  </div>
  <div>
    <label>Limit</label>
    <select id="neighborLimit">
      <option value="5">5</option>
      <option value="10" selected>10</option>
      <option value="20">20</option>
      <option value="50">50</option>
    </select>
  </div>
  <div>
    <label>Month</label>
    <select id="monthFilter">
      <option value="">All</option>
    </select>
  </div>
  <div>
    <label>DJ</label>
    <select id="djFilter">
      <option value="">All</option>
    </select>
  </div>
  <span id="status"></span>
</div>

<div id="tooltip">
  <div class="name"></div>
  <div class="meta"></div>
</div>

<div id="sidebar">
  <div class="sidebar-header">
    <span class="artist-name">Select an artist</span>
    <span class="artist-meta"></span>
    <div class="streaming-embeds"></div>
    <div class="external-links"></div>
  </div>
  <div class="sidebar-list">
    <div class="sidebar-empty">Search or click an artist to see relationships</div>
  </div>
</div>

<svg id="graph"></svg>

<script type="module">
import { parseURL, buildURL, DEFAULTS } from './url-state.js';

const API_BASE = window.location.hostname === 'localhost' || window.location.protocol === 'file:'
  ? 'http://localhost:8000'
  : window.location.origin;

const SIDEBAR_WIDTH = 380;

const GENRE_COLORS = {
  'Electronic': '#4fc3f7',
  'Rock': '#ef5350',
  'Jazz': '#ffd54f',
  'Hiphop': '#ab47bc',
  'Classical': '#66bb6a',
  'Africa': '#ff7043',
  'Reggae': '#26a69a',
  'Latin': '#ec407a',
  'Blues': '#5c6bc0',
  'Asia': '#8d6e63',
  'OCS': '#78909c',
  'Spoken': '#bdbdbd',
  'Comedy': '#fff176',
  'Soundtracks': '#a1887f',
};
const DEFAULT_COLOR = '#555';

const width = window.innerWidth - SIDEBAR_WIDTH;
const height = window.innerHeight;

const svg = d3.select('#graph')
  .attr('width', width)
  .attr('height', height);

const g = svg.append('g');

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.1, 8])
  .on('zoom', (e) => g.attr('transform', e.transform));
svg.call(zoom);

let simulation;
let nodes = [];
let links = [];
let nodeMap = new Map();

const hitGroup = g.append('g').attr('class', 'hit-lines');
const linkGroup = g.append('g').attr('class', 'links');
const nodeGroup = g.append('g').attr('class', 'nodes');
const labelGroup = g.append('g').attr('class', 'labels');

const tooltip = document.getElementById('tooltip');

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

async function api(path, params = {}, signal) {
  const url = new URL(path, API_BASE);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url, signal ? { signal } : undefined);
  if (!res.ok) return null;
  return res.json();
}

function getColor(genre) {
  return GENRE_COLORS[genre] || DEFAULT_COLOR;
}

function nodeRadius(plays) {
  return Math.max(3, Math.min(20, Math.sqrt(plays || 1) * 0.8));
}

function linkWidth(weight) {
  return Math.max(0.5, Math.min(5, Math.abs(weight) * 0.5));
}

// --- Sidebar ---

let sidebarGeneration = 0;
let activeCardId = null;

function renderStreamingEmbeds(detail) {
  const container = document.querySelector('.streaming-embeds');
  container.innerHTML = '';
  if (!detail) return;

  if (detail.spotify_artist_id) {
    const iframe = document.createElement('iframe');
    iframe.src = `https://open.spotify.com/embed/artist/${detail.spotify_artist_id}?utm_source=generator&theme=0`;
    iframe.height = '152';
    iframe.allow = 'autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture';
    iframe.loading = 'lazy';
    container.appendChild(iframe);
  }

  if (detail.apple_music_artist_id) {
    const iframe = document.createElement('iframe');
    iframe.src = `https://embed.music.apple.com/us/artist/${detail.apple_music_artist_id}?theme=dark`;
    iframe.height = '175';
    iframe.allow = 'autoplay; encrypted-media; fullscreen';
    iframe.setAttribute('sandbox', 'allow-forms allow-popups allow-same-origin allow-scripts allow-top-navigation-by-user-activation');
    iframe.loading = 'lazy';
    container.appendChild(iframe);
  }

  if (detail.bandcamp_id) {
    const link = document.createElement('a');
    link.href = `https://${detail.bandcamp_id}.bandcamp.com`;
    link.target = '_blank';
    link.rel = 'noopener';
    link.textContent = 'Listen on Bandcamp';
    link.style.cssText = 'display:inline-block;font-size:12px;color:#6a9fb5;padding:6px 12px;border:1px solid #333;border-radius:4px;text-decoration:none;margin-top:4px;';
    container.appendChild(link);
  }
}

function renderExternalLinks(detail) {
  const container = document.querySelector('.external-links');
  container.innerHTML = '';
  if (!detail) return;

  if (detail.discogs_artist_id) {
    const a = document.createElement('a');
    a.href = `https://www.discogs.com/artist/${detail.discogs_artist_id}`;
    a.target = '_blank'; a.rel = 'noopener'; a.textContent = 'Discogs';
    container.appendChild(a);
  }
  if (detail.musicbrainz_artist_id) {
    const a = document.createElement('a');
    a.href = `https://musicbrainz.org/artist/${detail.musicbrainz_artist_id}`;
    a.target = '_blank'; a.rel = 'noopener'; a.textContent = 'MusicBrainz';
    container.appendChild(a);
  }
  if (detail.wikidata_qid) {
    const a = document.createElement('a');
    a.href = `https://www.wikidata.org/wiki/${detail.wikidata_qid}`;
    a.target = '_blank'; a.rel = 'noopener'; a.textContent = 'Wikidata';
    container.appendChild(a);
  }
}

function populateSidebar(centerArtist, neighbors) {
  sidebarGeneration++;
  const gen = sidebarGeneration;

  const header = document.querySelector('.sidebar-header');
  header.querySelector('.artist-name').textContent = centerArtist.canonical_name;
  header.querySelector('.artist-meta').textContent =
    `${centerArtist.genre || 'Unknown genre'} · ${centerArtist.total_plays || 0} plays`;

  // Clear embeds/links while loading
  renderStreamingEmbeds(null);
  renderExternalLinks(null);

  // Fetch full artist detail for streaming IDs and external links
  api(`/graph/artists/${centerArtist.id}`).then(detail => {
    if (gen !== sidebarGeneration) return; // stale
    renderStreamingEmbeds(detail);
    renderExternalLinks(detail);
  });

  const list = document.querySelector('.sidebar-list');
  list.innerHTML = '';
  activeCardId = null;

  if (!neighbors || neighbors.length === 0) {
    list.innerHTML = '<div class="sidebar-empty">No neighbors found</div>';
    return;
  }

  // Sort by weight descending
  const sorted = [...neighbors].sort((a, b) => Math.abs(b.weight) - Math.abs(a.weight));

  const observer = new IntersectionObserver((entries) => {
    for (const entry of entries) {
      if (entry.isIntersecting) {
        const card = entry.target;
        observer.unobserve(card);
        loadNarrative(card, centerArtist.id, parseInt(card.dataset.neighborId), gen);
      }
    }
  }, { root: list, threshold: 0.1 });

  for (const n of sorted) {
    const card = document.createElement('div');
    card.className = 'sidebar-card';
    card.dataset.neighborId = n.artist.id;

    const weightDisplay = Math.abs(n.weight).toFixed(1);

    card.innerHTML = `
      <div class="card-header">
        <span class="neighbor-name">${escapeHtml(n.artist.canonical_name)}</span>
        <span class="weight-badge">${weightDisplay}</span>
      </div>
      <div class="neighbor-meta">${escapeHtml(n.artist.genre || 'Unknown')} · ${n.artist.total_plays || 0} plays</div>
      <div class="narrative loading">Loading...</div>
    `;

    // Click card: highlight edge and navigate
    card.addEventListener('click', () => {
      highlightEdge(centerArtist.id, n.artist.id);
      setActiveCard(card);
    });

    // Hover card: temporarily highlight edge
    card.addEventListener('mouseenter', () => {
      highlightEdge(centerArtist.id, n.artist.id);
    });
    card.addEventListener('mouseleave', () => {
      if (activeCardId !== n.artist.id) clearEdgeHighlight();
    });

    list.appendChild(card);
    observer.observe(card);
  }

  // Eager-load top 5
  const eagerCards = list.querySelectorAll('.sidebar-card');
  for (let i = 0; i < Math.min(5, eagerCards.length); i++) {
    observer.unobserve(eagerCards[i]);
    loadNarrative(eagerCards[i], centerArtist.id, parseInt(eagerCards[i].dataset.neighborId), gen);
  }
}

async function loadNarrative(card, sourceId, targetId, gen) {
  const narrativeEl = card.querySelector('.narrative');

  const params = {};
  const monthVal = document.getElementById('monthFilter').value;
  const djVal = document.getElementById('djFilter').value;
  if (monthVal) params.month = monthVal;
  if (djVal) params.dj_id = djVal;

  try {
    const data = await api(`/graph/artists/${sourceId}/explain/${targetId}/narrative`, params);
    if (gen !== sidebarGeneration) return; // stale
    if (data && data.narrative) {
      narrativeEl.textContent = data.narrative;
      narrativeEl.classList.remove('loading');
    } else {
      narrativeEl.textContent = 'Narrative unavailable.';
      narrativeEl.classList.remove('loading');
    }
  } catch {
    if (gen !== sidebarGeneration) return;
    narrativeEl.textContent = 'Narrative unavailable.';
    narrativeEl.classList.remove('loading');
  }
}

function setActiveCard(card) {
  document.querySelectorAll('.sidebar-card.active').forEach(c => c.classList.remove('active'));
  card.classList.add('active');
  activeCardId = parseInt(card.dataset.neighborId);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// --- Edge highlighting ---

let highlightedSourceId = null;
let highlightedTargetId = null;

function highlightEdge(sourceId, targetId) {
  highlightedSourceId = sourceId;
  highlightedTargetId = targetId;
  linkGroup.selectAll('line')
    .attr('stroke', d => {
      const sId = d.source.id || d.source;
      const tId = d.target.id || d.target;
      const match = (sId === sourceId && tId === targetId) || (sId === targetId && tId === sourceId);
      return match ? '#6a9fb5' : '#333';
    })
    .attr('stroke-opacity', d => {
      const sId = d.source.id || d.source;
      const tId = d.target.id || d.target;
      const match = (sId === sourceId && tId === targetId) || (sId === targetId && tId === sourceId);
      return match ? 1 : 0.3;
    })
    .attr('stroke-width', d => {
      const sId = d.source.id || d.source;
      const tId = d.target.id || d.target;
      const match = (sId === sourceId && tId === targetId) || (sId === targetId && tId === sourceId);
      return match ? Math.max(2, linkWidth(d.weight) * 1.5) : linkWidth(d.weight);
    });
}

function clearEdgeHighlight() {
  highlightedSourceId = null;
  highlightedTargetId = null;
  linkGroup.selectAll('line')
    .attr('stroke', '#333')
    .attr('stroke-opacity', 0.6)
    .attr('stroke-width', d => linkWidth(d.weight));
}

// --- Graph ---

let currentCenterId = null;
let currentNeighborData = null;

async function loadNeighborhood(artistId, artistName, depth = 2) {
  setStatus(`Loading ${artistName}...`);

  const edgeType = document.getElementById('edgeType').value;
  const limit = parseInt(document.getElementById('neighborLimit').value);

  // Build neighbor params, including facets when active
  const neighborParams = { type: edgeType, limit: limit };
  const monthVal = document.getElementById('monthFilter').value;
  const djVal = document.getElementById('djFilter').value;
  if (monthVal) neighborParams.month = monthVal;
  if (djVal) neighborParams.dj_id = djVal;

  // Fetch neighbors
  const data = await api(`/graph/artists/${artistId}/neighbors`, neighborParams);

  if (!data || !data.neighbors) {
    setStatus(`No neighbors found for ${artistName}`);
    return;
  }

  // Add center node if not present
  if (!nodeMap.has(artistId)) {
    const center = data.artist || { id: artistId, canonical_name: artistName, total_plays: 0 };
    center.isCenter = true;
    nodes.push(center);
    nodeMap.set(artistId, center);
  } else {
    nodeMap.get(artistId).isCenter = true;
  }

  currentCenterId = artistId;
  currentNeighborData = data.neighbors;

  // Add neighbor nodes and links
  for (const n of data.neighbors) {
    const neighbor = n.artist;
    if (!nodeMap.has(neighbor.id)) {
      nodes.push(neighbor);
      nodeMap.set(neighbor.id, neighbor);
    }
    links.push({
      source: artistId,
      target: neighbor.id,
      weight: n.weight || 1,
      edgeType: data.edge_type || edgeType,
    });
  }

  // Depth 2: fetch neighbors of neighbors
  if (depth >= 2) {
    const secondHopIds = data.neighbors.map(n => n.artist.id);
    const secondHopLimit = Math.max(3, Math.floor(limit / 2));
    const secondHopParams = { type: edgeType, limit: secondHopLimit };
    if (monthVal) secondHopParams.month = monthVal;
    if (djVal) secondHopParams.dj_id = djVal;
    const promises = secondHopIds.slice(0, 10).map(id =>
      api(`/graph/artists/${id}/neighbors`, secondHopParams)
    );
    const results = await Promise.all(promises);
    for (const res of results) {
      if (!res || !res.neighbors) continue;
      const sourceId = res.artist.id;
      for (const n of res.neighbors) {
        if (!nodeMap.has(n.artist.id)) {
          nodes.push(n.artist);
          nodeMap.set(n.artist.id, n.artist);
        }
        links.push({
          source: sourceId,
          target: n.artist.id,
          weight: n.weight || 1,
          edgeType: res.edge_type || edgeType,
        });
      }
    }
  }

  setStatus(`${nodes.length} artists, ${links.length} edges`);
  render();

  // Populate sidebar with first-hop neighbors
  const centerNode = nodeMap.get(artistId);
  populateSidebar(centerNode, data.neighbors);

  // Update URL to reflect current state
  const controls = {
    edge: document.getElementById('edgeType').value,
    depth: document.getElementById('depth').value,
    limit: document.getElementById('neighborLimit').value,
    month: document.getElementById('monthFilter').value,
    dj: document.getElementById('djFilter').value,
  };
  history.pushState({ artistName }, '', buildURL(artistName, controls));
}

function render() {
  // Deduplicate links
  const linkSet = new Set();
  const dedupedLinks = [];
  for (const l of links) {
    const key = [Math.min(l.source, l.target), Math.max(l.source, l.target)].join('-');
    if (!linkSet.has(key)) {
      linkSet.add(key);
      dedupedLinks.push(l);
    }
  }

  // Stop existing simulation
  if (simulation) simulation.stop();

  // Create simulation
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(dedupedLinks).id(d => d.id).distance(80))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(d => nodeRadius(d.total_plays) + 2));

  // Hit lines (invisible wide targets)
  const hit = hitGroup.selectAll('line').data(dedupedLinks, d => `${d.source.id || d.source}-${d.target.id || d.target}`);
  hit.exit().remove();
  const hitEnter = hit.enter().append('line')
    .attr('stroke', 'transparent')
    .attr('stroke-width', 14);
  const hitMerged = hitEnter.merge(hit);

  // Links
  const link = linkGroup.selectAll('line').data(dedupedLinks, d => `${d.source.id || d.source}-${d.target.id || d.target}`);
  link.exit().remove();
  const linkEnter = link.enter().append('line')
    .attr('stroke', '#333')
    .attr('stroke-opacity', 0.6)
    .attr('stroke-width', d => linkWidth(d.weight));
  const linkMerged = linkEnter.merge(link);

  // Nodes
  const node = nodeGroup.selectAll('circle').data(nodes, d => d.id);
  node.exit().remove();
  const nodeEnter = node.enter().append('circle')
    .attr('r', d => nodeRadius(d.total_plays))
    .attr('fill', d => getColor(d.genre))
    .attr('stroke', d => d.isCenter ? '#fff' : 'none')
    .attr('stroke-width', d => d.isCenter ? 2 : 0)
    .style('cursor', 'pointer')
    .on('click', (e, d) => {
      e.stopPropagation();
      clearGraph();
      searchInput.value = d.canonical_name;
      loadNeighborhood(d.id, d.canonical_name, parseInt(document.getElementById('depth').value));
    })
    .on('mouseover', (e, d) => {
      tooltip.style.display = 'block';
      tooltip.querySelector('.name').textContent = d.canonical_name;
      tooltip.querySelector('.meta').textContent =
        `${d.genre || 'Unknown genre'} · ${d.total_plays} plays`;
    })
    .on('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    })
    .on('mouseout', () => {
      tooltip.style.display = 'none';
    })
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    );
  const nodeMerged = nodeEnter.merge(node);

  // Labels
  const label = labelGroup.selectAll('text').data(nodes, d => d.id);
  label.exit().remove();
  const labelEnter = label.enter().append('text')
    .text(d => d.canonical_name)
    .attr('font-size', d => d.isCenter ? 12 : 10)
    .attr('fill', d => d.isCenter ? '#fff' : '#999')
    .attr('font-weight', d => d.isCenter ? 600 : 400)
    .attr('text-anchor', 'middle')
    .attr('dy', d => -nodeRadius(d.total_plays) - 4)
    .style('pointer-events', 'none');
  const labelMerged = labelEnter.merge(label);

  simulation.on('tick', () => {
    hitMerged
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
    linkMerged
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
    nodeMerged
      .attr('cx', d => d.x)
      .attr('cy', d => d.y);
    labelMerged
      .attr('x', d => d.x)
      .attr('y', d => d.y - nodeRadius(d.total_plays) - 4);
  });
}

function clearGraph() {
  nodes = [];
  links = [];
  nodeMap.clear();
  hitGroup.selectAll('*').remove();
  linkGroup.selectAll('*').remove();
  nodeGroup.selectAll('*').remove();
  labelGroup.selectAll('*').remove();
  if (simulation) simulation.stop();
  clearEdgeHighlight();
}

// Search with debounce
let searchTimeout;
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(async () => {
    const q = searchInput.value.trim();
    if (q.length < 2) return;
    const data = await api('/graph/artists/search', { q, limit: 1 });
    if (data && data.results && data.results.length > 0) {
      const artist = data.results[0];
      clearGraph();
      loadNeighborhood(artist.id, artist.canonical_name, parseInt(document.getElementById('depth').value));
      searchInput.value = artist.canonical_name;
    }
  }, 500);
});

searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    clearTimeout(searchTimeout);
    searchInput.dispatchEvent(new Event('input'));
  }
});

// Re-render when controls change
function reloadCenter() {
  const centerNode = nodes.find(n => n.isCenter);
  if (centerNode) {
    clearGraph();
    loadNeighborhood(centerNode.id, centerNode.canonical_name, parseInt(document.getElementById('depth').value));
  }
}
function updateFacetState() {
  const isDjTransition = document.getElementById('edgeType').value === 'djTransition';
  document.getElementById('monthFilter').disabled = !isDjTransition;
  document.getElementById('djFilter').disabled = !isDjTransition;
}
document.getElementById('edgeType').addEventListener('change', () => { updateFacetState(); reloadCenter(); });
document.getElementById('depth').addEventListener('change', reloadCenter);
document.getElementById('neighborLimit').addEventListener('change', reloadCenter);
document.getElementById('monthFilter').addEventListener('change', reloadCenter);
document.getElementById('djFilter').addEventListener('change', reloadCenter);

// Resolve an artist name via search and load their neighborhood
async function searchAndLoad(name, depth) {
  const data = await api('/graph/artists/search', { q: name, limit: 1 });
  if (data && data.results && data.results.length > 0) {
    const artist = data.results[0];
    searchInput.value = artist.canonical_name;
    loadNeighborhood(artist.id, artist.canonical_name, parseInt(depth));
    return true;
  }
  return false;
}

// Back/forward navigation
window.addEventListener('popstate', async () => {
  const state = parseURL(window.location.search);
  document.getElementById('edgeType').value = state.edge;
  document.getElementById('depth').value = state.depth;
  document.getElementById('neighborLimit').value = state.limit;
  document.getElementById('monthFilter').value = state.month;
  document.getElementById('djFilter').value = state.dj;
  updateFacetState();
  if (state.artist != null) {
    clearGraph();
    await searchAndLoad(state.artist, state.depth);
  }
});

// Load a random artist from the full database
async function loadRandomArtist() {
  const data = await api('/graph/artists/random');
  if (data) {
    clearGraph();
    searchInput.value = data.canonical_name;
    loadNeighborhood(data.id, data.canonical_name, parseInt(document.getElementById('depth').value));
  }
}

document.getElementById('random').addEventListener('click', loadRandomArtist);

// Populate facet dropdowns from API
async function loadFacets() {
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const data = await api('/graph/facets');
  if (!data) return;

  const monthSelect = document.getElementById('monthFilter');
  for (const m of data.months) {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = monthNames[m - 1];
    monthSelect.appendChild(opt);
  }

  const djSelect = document.getElementById('djFilter');
  for (const dj of data.djs) {
    const opt = document.createElement('option');
    opt.value = dj.id;
    opt.textContent = dj.display_name;
    djSelect.appendChild(opt);
  }
}

// Initialize from URL or random artist
(async () => {
  await loadFacets();

  const state = parseURL(window.location.search);
  document.getElementById('edgeType').value = state.edge;
  document.getElementById('depth').value = state.depth;
  document.getElementById('neighborLimit').value = state.limit;
  document.getElementById('monthFilter').value = state.month;
  document.getElementById('djFilter').value = state.dj;
  updateFacetState();

  if (state.artist) {
    if (await searchAndLoad(state.artist, state.depth)) return;
  }
  // No artist in URL or search failed — load a random one
  await loadRandomArtist();
  if (nodes.length === 0) {
    setStatus('API not available — start the server with: DB_PATH=output/wxyc_artist_graph.db python -m semantic_index.api');
  }
})();
</script>
